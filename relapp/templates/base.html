<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}RelApp{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <nav class="app-nav">
      <a class="brand" href="{{ url_for('main.index') }}">RelApp</a>
      <div class="nav-links">
        <a href="{{ url_for('main.index') }}">Analizador</a>
        <a href="{{ url_for('main.manual') }}">Manual</a>
      </div>
    </nav>

    <main>
      {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='vendor/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/cytoscape.min.js') }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
